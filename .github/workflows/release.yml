name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  verify:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Validate wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Verify library
        run: ./gradlew :lib:test

      - name: Verify local Maven publication
        run: ./gradlew :lib:publishToMavenLocal

  publish:
    runs-on: ubuntu-latest
    needs: verify

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Validate publication secrets
        env:
          PUBLICATION_REPOSITORY_URL: ${{ secrets.PUBLICATION_REPOSITORY_URL }}
          PUBLICATION_REPOSITORY_USERNAME: ${{ secrets.PUBLICATION_REPOSITORY_USERNAME }}
          PUBLICATION_REPOSITORY_PASSWORD: ${{ secrets.PUBLICATION_REPOSITORY_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          if [ -z "$PUBLICATION_REPOSITORY_USERNAME" ]; then
            echo "PUBLICATION_REPOSITORY_USERNAME secret is required for release publication."
            exit 1
          fi
          if [ -z "$PUBLICATION_REPOSITORY_PASSWORD" ]; then
            echo "PUBLICATION_REPOSITORY_PASSWORD secret is required for release publication."
            exit 1
          fi
          if [ -z "$SIGNING_KEY_ID" ]; then
            echo "SIGNING_KEY_ID secret is required for Central publication."
            exit 1
          fi
          if [ -z "$SIGNING_KEY" ]; then
            echo "SIGNING_KEY secret is required for Central publication."
            exit 1
          fi
          if [ -z "$SIGNING_PASSWORD" ]; then
            echo "SIGNING_PASSWORD secret is required for Central publication."
            exit 1
          fi

      - name: Build Central bundle
        env:
          ORG_GRADLE_PROJECT_signingKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew :lib:packageCentralBundle

      - name: Publish bundle to Central Portal
        env:
          PUBLICATION_REPOSITORY_USERNAME: ${{ secrets.PUBLICATION_REPOSITORY_USERNAME }}
          PUBLICATION_REPOSITORY_PASSWORD: ${{ secrets.PUBLICATION_REPOSITORY_PASSWORD }}
        run: |
          CENTRAL_TOKEN=$(printf '%s' "$PUBLICATION_REPOSITORY_USERNAME:$PUBLICATION_REPOSITORY_PASSWORD" | base64 | tr -d '\n')
          BUNDLE_PATH=$(find lib/build/central-bundle/dist -maxdepth 1 -type f -name '*.zip' | head -n 1)

          if [ -z "$BUNDLE_PATH" ]; then
            echo "Central bundle was not generated."
            exit 1
          fi

          DEPLOYMENT_NAME="io.github.animalab-netizen:kotlin-drmanhatan:${GITHUB_REF_NAME#v}"
          ENCODED_DEPLOYMENT_NAME=$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$DEPLOYMENT_NAME")

          DEPLOYMENT_ID=$(
            curl --fail --show-error --silent \
              --request POST \
              --header "Authorization: Bearer $CENTRAL_TOKEN" \
              --form "bundle=@${BUNDLE_PATH}" \
              "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC&name=${ENCODED_DEPLOYMENT_NAME}"
          )

          echo "Deployment ID: $DEPLOYMENT_ID"

          python3 - "$CENTRAL_TOKEN" "$DEPLOYMENT_ID" <<'PY'
import json
import sys
import time
from urllib.error import HTTPError
from urllib.request import Request, urlopen

token = sys.argv[1]
deployment_id = sys.argv[2]
url = f"https://central.sonatype.com/api/v1/publisher/status?id={deployment_id}"
terminal_states = {"PUBLISHED", "FAILED", "VALIDATED"}

for attempt in range(1, 41):
    request = Request(url, method="POST", headers={"Authorization": f"Bearer {token}"})
    try:
        with urlopen(request) as response:
            payload = json.loads(response.read().decode("utf-8"))
    except HTTPError as error:
        body = error.read().decode("utf-8", errors="replace")
        print(body)
        raise

    state = payload.get("deploymentState", "UNKNOWN")
    print(f"[{attempt}/40] deploymentState={state}")

    if state == "PUBLISHED":
        break

    if state == "FAILED":
        print(json.dumps(payload, indent=2))
        raise SystemExit(1)

    if state == "VALIDATED":
        publish_request = Request(
            f"https://central.sonatype.com/api/v1/publisher/deployment/{deployment_id}",
            method="POST",
            headers={"Authorization": f"Bearer {token}"},
        )
        with urlopen(publish_request):
            pass
        print("Deployment was VALIDATED; publish request sent.")

    time.sleep(15)
else:
    raise SystemExit("Timed out waiting for Central Portal deployment to finish.")
PY

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
