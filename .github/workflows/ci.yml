name: Kotlin DrManhatan CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Validate wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Run tests
        run: ./gradlew :lib:test

      - name: Validate local Maven publication
        run: ./gradlew :lib:publishToMavenLocal
